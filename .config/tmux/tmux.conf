# -----------------------------------------------------------------------------
# Basics
# -----------------------------------------------------------------------------
# Change prefix to C-t
set -g prefix C-t
unbind C-b

# Enable mouse support
set -g mouse on

# Appease Neovim :checkhealth
set -a terminal-features 'xterm-256color:RGB'
set -g focus-events on

# Use Vim keybindings.
set -g mode-keys vi

# -----------------------------------------------------------------------------
# Window numbering
# -----------------------------------------------------------------------------
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# -----------------------------------------------------------------------------
# Appearance
# -----------------------------------------------------------------------------
set -g status-position top
set -g status-left ""
set -g status-right "#S"

set -g status-style 'bg=default,fg=white,dim'
set -g window-status-current-style 'bg=default,fg=default'
set -g window-status-style 'bg=default,fg=orange,bold'

# -----------------------------------------------------------------------------
# Shortcuts
# -----------------------------------------------------------------------------
# Toggle the status bar
bind s set status

# Quickly access LazyGit in an overlay
bind g display-popup -w 95% -h 95% -E lazygit
